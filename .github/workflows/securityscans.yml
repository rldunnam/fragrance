name: DevSecOps Security Pipeline

on:
  pull_request:
  push:
    branches: [main, test]

jobs:
  # -----------------------------
  # Job 1: Semgrep (SAST + Secrets + IaC)
  # -----------------------------
  semgrep:
    runs-on: ubuntu-latest
    outputs:
      sarif: ${{ steps.upload.outputs.sarif_file }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine changed paths
        id: changed
        run: |
          echo "CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '\.(py|js|ts|go|java|tf|yml|yaml|Dockerfile)$' | tr '\n' ' ')" >> $GITHUB_ENV
          echo "Changed paths: $CHANGED"
      
      - name: Run Semgrep
        id: semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/ci
            p/secrets
            p/terraform
            p/kubernetes
            p/docker
          paths: ${{ env.CHANGED }}
          generateSarif: "1"

      - name: Upload SARIF
        id: upload
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep-results.sarif

  # -----------------------------
  # Job 2: Trivy Container Scan
  # -----------------------------
  trivy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t ${{ github.repository }}:latest .
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ github.repository }}:latest
          format: sarif
          output: trivy-results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif

  # -----------------------------
  # Job 3: OSV Dependency Scan (conditional)
  # -----------------------------
  osv:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Determine changed dependency files
        id: deps
        run: |
          echo "CHANGED_DEPS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E 'package-lock.json|yarn.lock|requirements.txt|poetry.lock|go.mod|pom.xml' | tr '\n' ' ')" >> $GITHUB_ENV
          if [ -z "$CHANGED_DEPS" ]; then
            echo "No dependency changes"
            exit 78  # GitHub skips this job
          fi
          echo "Changed dependency files: $CHANGED_DEPS"
      
      - name: Run OSV Scanner
        uses: osvdev/osv-scanner-action@v1
        with:
          paths: ${{ env.CHANGED_DEPS }}
          output: osv-results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: osv-results.sarif

  # -----------------------------
  # Job 4: SBOM Generation
  # -----------------------------
  sbom:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: cyclonedx/cyclonedx-github-action@v2
        with:
          output-format: json
          output-file: sbom.json
