name: DevSecOps Security Pipeline

on:
  pull_request:
  push:
    branches: [main, test]

jobs:
  # -----------------------------
  # Job 1: Semgrep (SAST + Secrets + IaC)
  # -----------------------------
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine changed paths
        id: changed
        run: |
          echo "CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '\.(py|js|ts|go|java|tf|yml|yaml|Dockerfile)$' | tr '\n' ' ')" >> $GITHUB_ENV
          echo "Changed paths: $CHANGED"
      
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/ci
            p/secrets
            p/terraform
            p/kubernetes
            p/docker
          paths: ${{ env.CHANGED }}
          fail-on: "warning"   # fails the job if any warnings/issues are found
          output: semgrep-results.log

      - name: Show Semgrep results
        run: cat semgrep-results.log

  # -----------------------------
  # Job 2: Trivy Container Scan
  # -----------------------------
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t ${{ github.repository }}:latest .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ github.repository }}:latest
          exit-code: 1  # fail job on vulnerabilities
          severity: CRITICAL,HIGH,MEDIUM

  # -----------------------------
  # Job 3: OSV Dependency Scan (conditional)
  # -----------------------------
  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine changed dependency files
        id: deps
        run: |
          CHANGED_DEPS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E 'package-lock.json|yarn.lock|requirements.txt|poetry.lock|go.mod|pom.xml' | tr '\n' ' ')
          if [ -z "$CHANGED_DEPS" ]; then
            echo "No dependency changes, skipping OSV scan"
            exit 78   # GitHub skips this job
          fi
          echo "CHANGED_DEPS=$CHANGED_DEPS" >> $GITHUB_ENV

      - name: Run OSV Scanner
        uses: osvdev/osv-scanner-action@v1
        with:
          paths: ${{ env.CHANGED_DEPS }}
          fail-on: "high"

  # -----------------------------
  # Job 4: SBOM Generation
  # -----------------------------
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: cyclonedx/cyclonedx-github-action@v2
        with:
          output-format: json
          output-file: sbom.json
