name: DevSecOps Security Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # -----------------------------
  # Job 1: Semgrep (SAST + Secrets + IaC)
  # -----------------------------
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed paths
        id: changed
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '\.(py|js|ts|go|java|tf|yml|yaml|Dockerfile)$' || true)
          echo "CHANGED=${CHANGED:-.}" >> $GITHUB_ENV
          echo "Changed paths: $CHANGED"

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/ci
            p/secrets
            p/terraform
            p/kubernetes
            p/docker
          paths: ${{ env.CHANGED }}
          fail-on: "warning"

  # -----------------------------
  # Job 2: Trivy Container Scan
  # -----------------------------
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build container image with dummy envs
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=dummy \
            --build-arg NEXT_PUBLIC_CLERK_KEY=dummy \
            -t ${{ github.repository }}:latest .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ github.repository }}:latest
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM

  # -----------------------------
  # Job 3: OSV Dependency Scan (conditional)
  # -----------------------------
  osv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed dependency files
        id: deps
        run: |
          CHANGED_DEPS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E 'package-lock.json|yarn.lock|requirements.txt|poetry.lock|go.mod|pom.xml' || true)
          if [ -z "$CHANGED_DEPS" ]; then
            echo "No dependency changes, skipping OSV scan"
            exit 78
          fi
          echo "CHANGED_DEPS=$CHANGED_DEPS" >> $GITHUB_ENV
          echo "Changed dependency files: $CHANGED_DEPS"

      - name: Run OSV Scanner
        uses: osvdev/osv-scanner-action@v1
        with:
          paths: ${{ env.CHANGED_DEPS }}
          fail-on: "high"

  # -----------------------------
  # Job 4: SBOM Generation
  # -----------------------------
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SBOM
        uses: cyclonedx/cyclonedx-github-action@v2
        with:
          output-format: json
          output-file: sbom.json
